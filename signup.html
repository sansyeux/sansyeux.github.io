<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up — Nocturne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: var(--bg);
    }
    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }
    .auth-logo { text-align: center; margin-bottom: 2rem; }
    .auth-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--fg);
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .auth-sub {
      font-size: 0.8rem;
      color: var(--fg-dim);
      text-align: center;
      margin-bottom: 2rem;
    }
    .form-group { margin-bottom: 1rem; }
    .form-label {
      display: block;
      font-size: 0.75rem;
      color: var(--fg-muted);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.7rem 0.9rem;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--fg);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--purple); }
    .form-input::placeholder { color: var(--fg-dim); }
    .btn-full { width: 100%; padding: 0.8rem; font-size: 0.9rem; text-align: center; border-radius: var(--radius-md); cursor: pointer; display: block; margin-top: 1.5rem; }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: var(--fg-dim);
      font-size: 0.75rem;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .btn-oauth {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.7rem;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: var(--fg-muted);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-oauth:hover { border-color: var(--comment); color: var(--fg); }
    .auth-footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.78rem;
      color: var(--fg-dim);
    }
    .form-link { color: var(--purple); }
    .perks {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1rem;
      margin-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .perk {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.78rem;
      color: var(--fg-muted);
    }
    .perk-icon { color: var(--green); font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="index.html" class="nav-logo" style="font-size:1.5rem;">NOCTURNE</a>
      </div>
      <h1 class="auth-title">Join Nocturne</h1>
      <p class="auth-sub">Free forever. No ads. Just music.</p>

      <div class="perks">
        <div class="perk"><span class="perk-icon">✓</span> Rate and review any album</div>
        <div class="perk"><span class="perk-icon">✓</span> Build custom listening lists</div>
        <div class="perk"><span class="perk-icon">✓</span> Track your listening history</div>
        <div class="perk"><span class="perk-icon">✓</span> Follow other listeners</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-input" type="text" id="username" placeholder="yourname" />
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" placeholder="min. 8 characters" />
      </div>

      <a href="index.html" class="btn-primary btn-full">Create account</a>

      <div class="auth-divider">or</div>

      <button class="btn-oauth">
        <svg width="16" height="16" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign up with Google
      </button>

      <p style="font-size:0.7rem;color:var(--fg-dim);text-align:center;margin-top:1rem;">
        By signing up, you agree to our <a href="#" class="form-link">Terms</a> and <a href="#" class="form-link">Privacy Policy</a>.
      </p>

      <div class="auth-footer">
        Already have an account? <a href="login.html" class="form-link">Log in</a>
      </div>
    </div>
  </div>
</body>
</html>
